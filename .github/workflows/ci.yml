name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block tracked secret files
        run: |
          forbidden=$(git ls-files '.env' '.env.local' '.env.production' '.env.production.local' 'serviceAccount*.json' '*.pem' '*.key' || true)
          if [ -n "$forbidden" ]; then
            echo "Forbidden secret files are tracked in git:"
            echo "$forbidden"
            exit 1
          fi

      - name: Scan for hardcoded API keys
        run: |
          if grep -RInE 'AIza[0-9A-Za-z_-]{20,}' --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "Possible Google API key found in repository"
            exit 1
          fi
          echo "No hardcoded API keys detected"

  build:
    runs-on: ubuntu-latest
    needs: secret-scan
    env:
      VITE_FIREBASE_API_KEY: placeholder-for-ci-build
      VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: placeholder
      VITE_FIREBASE_STORAGE_BUCKET: placeholder.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_APP_ID: "1:000000000000:web:placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
